services:
  kafka:
    image: apache/kafka:3.7.2
    container_name: kafka
    hostname: kafka
    # No host ports — Kafka is reachable only inside the compose network at kafka:9092
    environment:
      # KRaft single-node setup (no Zookeeper)
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Single-node: replication factors must be 1, otherwise internal topics
      # (consumer offsets, transactions) fail to create on first use.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  listener:
    build: ./listener
    container_name: telegram-listener
    env_file: .env
    volumes:
      # Mount the whole data dir so Telethon can create listener.session itself.
      # A single-file bind mount auto-creates a directory on the host if the
      # file is missing, which then fails to open as SQLite.
      - ./data:/app/data
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    # No host ports — only reachable inside the compose network at redis:6379
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  consumer:
    build: ./consumer
    container_name: telegram-consumer
    env_file: .env
    volumes:
      - ./data:/app/data:ro
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  executor:
    build: ./executor
    container_name: forex-executor
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

volumes:
  kafka_data:
  redis_data:
